schema_variable_name: "marketo_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: false

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "features disabled"
    vars:
      lead_history_columns: ['first_name', 'lead_status', 'urgency', 'priority', 'relative_score', 'relative_urgency', 'demographic_score_marketing', 'behavior_score_marketing']
      marketo__enable_campaigns: false
      marketo__enable_programs: false
      marketo__activity_delete_lead_enabled: false
    include_incremental: false
