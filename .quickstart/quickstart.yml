database_key: marketo_database
schema_key: marketo_schema

dbt_versions: ">=1.3.0 <3.0.0"

table_variables:
  marketo__enable_campaigns:
    - program
    - campaign
  marketo__enable_programs:
    - program
  marketo__activity_delete_lead_enabled:
    - activity_delete_lead

destination_configurations:
  databricks:
    dispatch:
      - macro_namespace: dbt_utils
        search_order: [ 'spark_utils', 'dbt_utils' ]

public_models: [
  "marketo__email_templates",
  "marketo__lead_history",
  "marketo__email_sends",
  "marketo__leads",
  "marketo__campaigns",
  "marketo__programs"
]

supported_vars:
  marketo__activity_send_email_passthrough_columns:
    type: dictionary
    description: "Additional `ACTIVITY_SEND_EMAIL` report columns to include in `marketo__email_sends`"
    display_name: "Additional Email Send Columns"

  marketo__program_passthrough_columns:
    type: dictionary
    description: "Additional `PROGRAM` report columns to include in `marketo__programs`"
    display_name: "Additional Program Columns"

  lead_history_columns:
    type: list
    value:
      - "lead_status"
      - "urgency"
      - "priority"
      - "relative_score"
      - "relative_urgency"
      - "demographic_score_marketing"
      - "behavior_score_marketing"
    description: "Lead fields tracked daily in `marketo__lead_history`. Must match `LEAD_DESCRIBE.restname` values in snake case"
    display_name: "Lead History Columns"

